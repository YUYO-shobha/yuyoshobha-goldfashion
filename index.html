<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>YUYO SHOBHA FASHION HUB</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html { scroll-behavior: smooth; }

body {
    font-family: Arial;
    margin: 0;
    background: #fff8f0;
}

/* HEADER */
header {
    background: black;
    color: gold;
    text-align: center;
    padding: 15px;
}

nav {
    background: gold;
    text-align: center;
    padding: 10px;
}

nav a {
    margin: 10px;
    text-decoration: none;
    color: black;
    font-weight: bold;
}

/* SEARCH */
.search {
    text-align: center;
    margin: 20px;
}

.search input {
    padding: 10px;
    width: 250px;
}

/* FILTER */
.filters {
    text-align: center;
}

.filters button {
    padding: 10px;
    margin: 5px;
    background: black;
    color: gold;
    border: none;
    cursor: pointer;
}

/* PRODUCTS */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
    gap: 15px;
    padding: 15px;
}

.card {
    background: white;
    border-radius: 10px;
    text-align: center;
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    cursor: pointer;
}

.btn {
    background: green;
    color: white;
    padding: 8px;
    display: inline-block;
    margin: 10px;
    text-decoration: none;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
}

.modal-content {
    background: white;
    margin: 60px auto;
    padding: 20px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    border-radius: 10px;
}

.modal-content img {
    width: 100%;
    cursor: zoom-in;
    transition: 0.3s;
}

.modal-content img.zoomed {
    transform: scale(1.5);
    cursor: zoom-out;
}

#thumbnailContainer img {
    width: 60px;
    margin: 5px;
    cursor: pointer;
}

.close {
    position: absolute;
    right: 20px;
    top: 10px;
    color: white;
    font-size: 30px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
<h1>YUYO SHOBHA FASHION HUB</h1>
</header>

<nav>
<a href="#">Home</a>
<a href="#products">Collection</a>
</nav>

<div class="search">
<input type="text" id="searchBox" placeholder="Search..." onkeyup="searchProducts()">
</div>

<div class="filters">
<button onclick="filterProducts('all')">All</button>
<button onclick="filterProducts('kurta')">Kurta</button>
<button onclick="filterProducts('saree')">Saree</button>
<button onclick="filterProducts('jewellery')">Jewellery</button>
</div>

<section id="products">
<div class="products">

<!-- PRODUCT 1 -->
<div class="card kurta"
data-name="Kurta"
data-price="₹1000"
data-images="kurta.png,kurta1.png,kurta2.png"
data-desc="Beautiful kurta">
<img src="kurta.png" onclick="openModal(this)">
<p>Kurta</p>
<p>₹1000</p>
</div>

<!-- PRODUCT 2 -->
<div class="card saree"
data-name="Saree"
data-price="₹300"
data-images="saree1.png,saree2.png"
data-desc="Nice saree">
<img src="saree1.png" onclick="openModal(this)">
<p>Saree</p>
<p>₹300</p>
</div>

<!-- PRODUCT 3 -->
<div class="card jewellery"
data-name="Chain"
data-price="₹499"
data-images="chain2.png"
data-desc="Gold chain">
<img src="chain2.png" onclick="openModal(this)">
<p>Chain</p>
<p>₹499</p>
</div>

</div>
</section>

<!-- MODAL -->
<div id="quickView" class="modal">
<span class="close" onclick="closeModal()">&times;</span>

<div class="modal-content">
<img id="mainImage">
<h3 id="modalName"></h3>
<p id="modalPrice"></p>
<p id="modalDesc"></p>

<div id="thumbnailContainer"></div>
</div>
</div>

<script>
function openModal(img){
const card = img.closest('.card');

const images = card.dataset.images.split(',');
const main = document.getElementById('mainImage');

document.getElementById('quickView').style.display='block';

main.src = images[0];
main.classList.remove('zoomed');

document.getElementById('modalName').innerText = card.dataset.name;
document.getElementById('modalPrice').innerText = card.dataset.price;
document.getElementById('modalDesc').innerText = card.dataset.desc;

const box = document.getElementById('thumbnailContainer');
box.innerHTML='';

images.forEach(src=>{
let i=document.createElement('img');
i.src=src;
i.onclick=()=>{ main.src=src; main.classList.remove('zoomed'); }
box.appendChild(i);
});
}

function closeModal(){
document.getElementById('quickView').style.display='none';
}

document.getElementById('mainImage').onclick=function(){
this.classList.toggle('zoomed');
}

function filterProducts(cat){
document.querySelectorAll('.card').forEach(c=>{
c.style.display = (cat=='all'||c.classList.contains(cat))?'block':'none';
});
}

function searchProducts(){
let q=document.getElementById('searchBox').value.toLowerCase();
document.querySelectorAll('.card').forEach(c=>{
c.style.display = c.dataset.name.toLowerCase().includes(q)?'block':'none';
});
}

window.onclick=function(e){
if(e.target==document.getElementById('quickView')){
closeModal();
}
}
</script>

</body>
</html>
